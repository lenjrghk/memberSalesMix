<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOK App 門店會員銷售佔比地圖</title>
    <link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script
      src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>

    <div id="header">
      <div>
        <h1>🗺️ SOK App 門店會員銷售佔比地圖</h1>
        <div class="subtitle">新 SOK App | <span id="storeCountLabel">-</span>
          家門店 | Kiosk GC 數據 | <span id="dateLabel">-</span></div>
      </div>
      <div class="date-picker" id="dbDateRange">
        <label>日期範圍</label>
        <input type="date" id="dbDateFrom" />
        <span>～</span>
        <input type="date" id="dbDateTo" />
        <button id="dbLoadBtn" type="button" title="載入 JSON 資料">🔄 載入</button>
        <button id="liveFetchBtn" type="button" title="從 MySQL 即時查詢">⚡
          Live</button>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="val" id="stat-total">197</div><div
            class="lbl">門店數</div></div>
        <div class="stat"><div class="val" id="stat-avg">-</div><div
            class="lbl">整體會員佔比</div></div>
        <div class="stat"><div class="val" id="stat-high">-</div><div
            class="lbl">最高門店</div></div>
        <div class="stat"><div class="val" id="stat-low">-</div><div
            class="lbl">最低門店</div></div>
      </div>
    </div>

    <div id="map"></div>
    <div id="tooltip"></div>

    <div id="controls">
      <h3>圖例 — 會員銷售佔比</h3>
      <div class="legend-actions">
        <button class="mini-btn" id="legendSelectAll" type="button">全選</button>
        <button class="mini-btn" id="legendClearAll" type="button">清空</button>
      </div>
      <div id="legendFilters"></div>
      <div class="range-box">
        <label>Store ID 範圍（數字）</label>
        <div class="range-inputs">
          <input id="storeRangeStart" type="number" min="1" placeholder="起始">
          <span>~</span>
          <input id="storeRangeEnd" type="number" min="1" placeholder="結束">
        </div>
      </div>
      <div class="filter-group">
        <label>店型 StoreType</label>
        <select id="filterStoreType">
          <option value>全部</option>
        </select>
      </div>
      <div class="filter-group">
        <label>設備 Hardware</label>
        <select id="filterHardware">
          <option value>全部</option>
        </select>
      </div>
      <button class="toggle-btn active" id="btnHeat" onclick="toggleHeat()">🌡
        熱力圖</button>
      <button class="toggle-btn active" id="btnDots" onclick="toggleDots()">📍
        門店標記</button>
      <button class="toggle-btn" id="btnLockFilter">🔓 鎖定當前門店</button>
      <div id="lockedSection">
        <h3>🔒 已鎖定門店</h3>
        <div class="locked-count" id="lockedCount">0 家</div>
        <div id="lockedStoreList"></div>
        <button id="unlockAllBtn" type="button">🔓 解除鎖定</button>
      </div>
    </div>

    <button id="mobileControlsToggle" type="button">⚙️</button>
    <button id="toggleStoreList">📋 門店列表</button>

    <div id="storeListPanel">
      <div id="storeListHeader">
        <div>
          <h3>篩選後的門店列表</h3>
          <span class="count" id="storeListCount">0 家門店</span>
        </div>
        <div class="store-list-actions">
          <button id="lockStoreList" type="button">🔓 未鎖定</button>
          <button id="closeStoreList">×</button>
        </div>
      </div>
      <div id="storeListContent"></div>
    </div>

    <script>
    (function() {
      const today = new Date();
      const weekAgo = new Date(today);
      weekAgo.setDate(weekAgo.getDate() - 7);
      const fmt = d => d.toISOString().slice(0, 10);
      const params = new URLSearchParams(location.search);
      document.getElementById('dbDateFrom').value = params.get('from') || fmt(weekAgo);
      document.getElementById('dbDateTo').value = params.get('to') || fmt(today);
    })();
    </script>
    <script>
// ──── DB MODE: JSON + Live API ────
let jsonData = null;
let dbReady = false;

const STORE_TYPE_MAP = { '0': '一般店', '1': '數位店' };
const mapStoreType = (v) => STORE_TYPE_MAP[String(v)] || v || '';

// Default API server URL (local)
const API_URL = localStorage.getItem('apiUrl') || 'http://localhost:5050';
let savedPassword = sessionStorage.getItem('dbPassword') || '';

async function loadJSONData() {
  if (window.__STORE_DAILY_DATA__) {
    // Already loaded via <script> tag (file:// mode)
    jsonData = window.__STORE_DAILY_DATA__;
  } else if (location.protocol === 'file:') {
    // file:// can't use fetch; load via dynamic <script>
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'data/store_daily.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed to load store_daily.js'));
      document.head.appendChild(s);
    });
    jsonData = window.__STORE_DAILY_DATA__;
  } else {
    const resp = await fetch('./data/store_daily.json');
    if (!resp.ok) throw new Error(`Failed to load JSON: ${resp.status}`);
    jsonData = await resp.json();
  }
  dbReady = true;

  const meta = jsonData.meta;
  if (meta) {
    document.getElementById('dbDateFrom').setAttribute('min', meta.min_date);
    document.getElementById('dbDateFrom').setAttribute('max', meta.max_date);
    document.getElementById('dbDateTo').setAttribute('min', meta.min_date);
    document.getElementById('dbDateTo').setAttribute('max', meta.max_date);
  }
  return jsonData;
}

function queryJSONStores(fromDate, toDate) {
  if (!jsonData) return [];
  const filtered = jsonData.store_daily.filter(r => r.d >= fromDate && r.d <= toDate);
  const dayCount = Math.max(1, new Set(filtered.map(r => r.d)).size);
  // Group by shop_code and aggregate
  const grouped = {};
  for (const r of filtered) {
    if (!r.sc) continue;
    if (!grouped[r.sc]) {
      grouped[r.sc] = { sc: r.sc, sn: r.sn, st: r.st, ta: 0, ma: 0, oc: 0, lat: r.lat, lon: r.lon, addr: r.addr };
    }
    grouped[r.sc].ta += r.ta || 0;
    grouped[r.sc].ma += r.ma || 0;
    grouped[r.sc].oc += r.oc || 0;
  }
  return Object.values(grouped).map(g => ({
    store_id: g.sc,
    address: g.addr || g.sn || '',
    lat: g.lat,
    lng: g.lon,
    mix: g.ta > 0 ? Math.round(g.ma / g.ta * 10000) / 100 : 0,
    phone_mix: null, qr_mix: null, coupon_mix: null,
    tc: g.oc, tc_daily: g.oc / dayCount, amt: g.ta, amt_daily: g.ta / dayCount,
    store_type: mapStoreType(g.st), hardware: '', shop_name: g.sn || '',
  })).sort((a, b) => a.mix - b.mix);
}

async function liveFetchStores(fromDate, toDate, password) {
  const resp = await fetch(`${API_URL}/api/query`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ from: fromDate, to: toDate, password }),
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  const d1 = new Date(fromDate), d2 = new Date(toDate);
  const dayCount = Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
  return data.stores.map(s => ({
    store_id: s.sc,
    address: s.addr || s.sn || '',
    lat: s.lat,
    lng: s.lon,
    mix: s.mr || 0,
    phone_mix: null, qr_mix: null, coupon_mix: null,
    tc: s.oc, tc_daily: (s.oc || 0) / dayCount, amt: s.ta, amt_daily: (s.ta || 0) / dayCount,
    store_type: mapStoreType(s.st), hardware: '', shop_name: s.sn || '',
  })).sort((a, b) => a.mix - b.mix);
}

function promptPassword() {
  const pw = prompt('🔑 請輸入 MySQL 密碼 (DB Password):');
  if (pw) {
    savedPassword = pw;
    sessionStorage.setItem('dbPassword', pw);
  }
  return pw;
}

// ──── END DB MODE ────

const dateLabel = document.getElementById('dateLabel');
const storeCountLabel = document.getElementById('storeCountLabel');
const legendFiltersEl = document.getElementById('legendFilters');
const legendSelectAllBtn = document.getElementById('legendSelectAll');
const legendClearAllBtn = document.getElementById('legendClearAll');
const storeRangeStartInput = document.getElementById('storeRangeStart');
const storeRangeEndInput = document.getElementById('storeRangeEnd');
const filterStoreTypeEl = document.getElementById('filterStoreType');
const filterHardwareEl = document.getElementById('filterHardware');

const MIX_BANDS = [
  { min: 0, max: 10, color: '#ffffff', label: '0 – 10%' },
  { min: 10, max: 20, color: '#3d0099', label: '10 – 20%' },
  { min: 20, max: 30, color: '#0033cc', label: '20 – 30%' },
  { min: 30, max: 40, color: '#0088ee', label: '30 – 40%' },
  { min: 40, max: 50, color: '#00ccbb', label: '40 – 50%' },
  { min: 50, max: 60, color: '#22dd55', label: '50 – 60%' },
  { min: 60, max: 70, color: '#aaee00', label: '60 – 70%' },
  { min: 70, max: 80, color: '#ffcc00', label: '70 – 80%' },
  { min: 80, max: 90, color: '#ff6600', label: '80 – 90%' },
  { min: 90, max: 100, color: '#ff1111', label: '90 – 100%' },
];

const selectedBandIndexes = new Set(MIX_BANDS.map((_, idx) => idx));
let allStores = [];

function formatPercent(value) {
  if (!Number.isFinite(value)) return '—';
  return value.toFixed(1) + '%';
}

function updateStats(stores) {
  const mixes = stores.map(s => s.mix).filter(Number.isFinite);
  const totalAmt = stores.reduce((a, s) => a + (Number.isFinite(s.amt) ? s.amt : 0), 0);
  const totalMemberAmt = stores.reduce((a, s) => a + (Number.isFinite(s.amt) ? s.amt : 0) * (Number.isFinite(s.mix) ? s.mix : 0) / 100, 0);
  const overallMix = totalAmt ? (totalMemberAmt / totalAmt * 100) : 0;
  const maxMix = mixes.length ? Math.max(...mixes) : 0;
  const minMix = mixes.length ? Math.min(...mixes) : 0;

  document.getElementById('stat-total').textContent = stores.length.toLocaleString();
  document.getElementById('stat-avg').textContent = overallMix.toFixed(1) + '%';
  document.getElementById('stat-high').textContent = maxMix.toFixed(1) + '%';
  document.getElementById('stat-low').textContent = minMix.toFixed(1) + '%';
  if (storeCountLabel) storeCountLabel.textContent = stores.length.toLocaleString();
}

// Init map
const map = L.map('map', {
  center: [23.9, 121.0],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors, © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Heatmap layer — weight by member mix
const heatLayer = L.heatLayer([], {
  radius: 28,
  blur: 22,
  maxZoom: 13,
  max: 1.0,
  gradient: {
    0.0:  '#ffffff',
    0.1:  '#3d0099',
    0.2:  '#0033cc',
    0.3:  '#0088ee',
    0.4:  '#00ccbb',
    0.5:  '#22dd55',
    0.6:  '#aaee00',
    0.7:  '#ffcc00',
    0.8:  '#ff6600',
    1.0:  '#ff1111'
  }
}).addTo(map);

// Dot markers
function getMixColor(mix) {
  if (mix >= 90) return '#ff1111';
  if (mix >= 80) return '#ff6600';
  if (mix >= 70) return '#ffcc00';
  if (mix >= 60) return '#aaee00';
  if (mix >= 50) return '#22dd55';
  if (mix >= 40) return '#00ccbb';
  if (mix >= 30) return '#0088ee';
  if (mix >= 20) return '#0033cc';
  if (mix >= 10) return '#3d0099';
  return '#ffffff';
}

function getBandIndex(mix) {
  if (!Number.isFinite(mix) || mix < 10) return 0;
  if (mix >= 90) return 9;
  return Math.floor(mix / 10);
}

function parseStoreNumericId(storeId) {
  const match = String(storeId || '').match(/(\d+)$/);
  return match ? Number.parseInt(match[1], 10) : NaN;
}

function getStoreRange() {
  const start = Number.parseInt(storeRangeStartInput.value, 10);
  const end = Number.parseInt(storeRangeEndInput.value, 10);
  return {
    start: Number.isFinite(start) ? start : null,
    end: Number.isFinite(end) ? end : null,
  };
}

function filterStores(stores) {
  const { start, end } = getStoreRange();
  const typeFilter = filterStoreTypeEl.value;
  const hwFilter = filterHardwareEl.value;
  return stores.filter((s) => {
    if (!selectedBandIndexes.has(getBandIndex(s.mix))) return false;
    const numericId = parseStoreNumericId(s.store_id);
    if (start !== null && Number.isFinite(numericId) && numericId < start) return false;
    if (end !== null && Number.isFinite(numericId) && numericId > end) return false;
    if (typeFilter && s.store_type !== typeFilter) return false;
    if (hwFilter && s.hardware !== hwFilter) return false;
    return true;
  });
}

function applyCurrentFilters() {
  const filteredStores = filterStores(allStores);
  if (storeListLocked) {
    const lockedDisplayStores = allStores.filter(s => lockedStoreIds.has(s.store_id));
    updateStats(lockedDisplayStores);
    updateHeat(lockedDisplayStores);
    renderMarkers(lockedDisplayStores);
    updateStoreList(lockedDisplayStores);
  } else {
    updateStats(filteredStores);
    updateHeat(filteredStores);
    renderMarkers(filteredStores);
    updateStoreList(filteredStores);
  }
}

function updateStoreList(stores) {
  const storeListContent = document.getElementById('storeListContent');
  const storeListCount = document.getElementById('storeListCount');
  
  storeListCount.textContent = storeListLocked
    ? `${stores.length} 家門店（已鎖定）`
    : `${stores.length} 家門店`;
  
  // Sort stores by store_id
  const sortedStores = [...stores].sort((a, b) => {
    const aNum = parseStoreNumericId(a.store_id);
    const bNum = parseStoreNumericId(b.store_id);
    if (Number.isFinite(aNum) && Number.isFinite(bNum)) {
      return aNum - bNum;
    }
    return String(a.store_id).localeCompare(String(b.store_id));
  });
  
  storeListContent.innerHTML = '';
  
  sortedStores.forEach(store => {
    const storeItem = document.createElement('div');
    storeItem.className = 'store-item';
    
    // Get all date metrics for this store
    const currentLabel = document.getElementById('dbDateFrom').value + '～' + document.getElementById('dbDateTo').value;
    allDateMixes = [{ label: currentLabel, value: (store.mix || 0).toFixed(1) }];
    
    // Build date mix HTML
    const dateMixHTML = allDateMixes.map(dm => `
      <div class="date-mix">
        <span class="date-mix-label">${dm.label}</span>
        <span class="date-mix-value">${dm.value}%</span>
      </div>
    `).join('');
    
    storeItem.innerHTML = `
      <div class="store-item-header">
        <span class="store-item-id">${store.store_id}</span>
        <span class="store-item-type">${store.store_type}</span>
      </div>
      <div class="store-item-dates">
        ${dateMixHTML}
      </div>
    `;
    
    // Click to fly to store on map
    storeItem.addEventListener('click', () => {
      if (Number.isFinite(store.lat) && Number.isFinite(store.lng)) {
        map.flyTo([store.lat, store.lng], 13);
      }
    });
    
    storeListContent.appendChild(storeItem);
  });
}

function renderLegendFilters() {
  legendFiltersEl.innerHTML = '';
  MIX_BANDS.forEach((band, idx) => {
    const row = document.createElement('label');
    row.className = 'legend-row';
    row.innerHTML = `
      <input type="checkbox" data-band-index="${idx}" checked>
      <div class="legend-color" style="background:${band.color}"></div>
      <span>${band.label}</span>
    `;
    legendFiltersEl.appendChild(row);
  });

  legendFiltersEl.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
    checkbox.addEventListener('change', (e) => {
      const idx = Number.parseInt(e.target.dataset.bandIndex, 10);
      if (e.target.checked) selectedBandIndexes.add(idx);
      else selectedBandIndexes.delete(idx);
      applyCurrentFilters();
    });
  });
}

const tooltip = document.getElementById('tooltip');
let markers = [];
let heatVisible = true, dotsVisible = true;
let storeListLocked = false;
let lockedStoreIds = new Set();

function updateHeat(stores) {
  const heatData = stores
    .filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng))
    .map(s => [s.lat, s.lng, s.mix / 100]);
  heatLayer.setLatLngs(heatData);
}

function renderMarkers(stores) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  stores.forEach(s => {
    if (!Number.isFinite(s.lat) || !Number.isFinite(s.lng)) return;
    const color = getMixColor(s.mix);
    const amtVal = Number.isFinite(s.amt_daily) ? s.amt_daily : (Number.isFinite(s.amt) ? s.amt : 0);
    const size = Math.max(6, Math.min(20, amtVal / 15000));

    const circle = L.circleMarker([s.lat, s.lng], {
      radius: size,
      fillColor: color,
      color: 'rgba(255,255,255,0.6)',
      weight: 1.5,
      fillOpacity: 0.85,
    });

    if (dotsVisible) {
      circle.addTo(map);
    }

    circle.on('mouseover', function(e) {
      const barColor = getMixColor(s.mix);
      tooltip.style.display = 'block';
      tooltip.innerHTML = `
        <div class="tip-id">${s.store_id} · ${s.store_type} · ${s.hardware}</div>
        <div class="tip-addr">${s.address}</div>
        <div class="tip-main" style="color:${barColor}">${formatPercent(s.mix)}</div>
        <div class="tip-row"><span class="tip-label">銷售額</span><span class="tip-value">NT$ ${(Number.isFinite(s.amt) ? s.amt : 0).toLocaleString()}</span></div>
        <div class="mix-bar"><div class="mix-fill" style="width:${Math.max(0, Math.min(100, s.mix))}%;background:${barColor}"></div></div>
      `;
      // <div class="tip-row"><span class="tip-label">來客數 TC</span><span class="tip-value">${(Number.isFinite(s.tc) ? s.tc : 0).toLocaleString()}</span></div>
      // <div class="tip-row"><span class="tip-label">📱 手機登入</span><span class="tip-value">${formatPercent(s.phone_mix)}</span></div>
      // <div class="tip-row"><span class="tip-label">📷 QR Code</span><span class="tip-value">${formatPercent(s.qr_mix)}</span></div>
      // <div class="tip-row"><span class="tip-label">🎫 優惠券</span><span class="tip-value">${formatPercent(s.coupon_mix)}</span></div>
    });

    circle.on('mousemove', function(e) {
      const x = e.originalEvent.clientX;
      const y = e.originalEvent.clientY;
      tooltip.style.left = (x + 16) + 'px';
      tooltip.style.top = (y - 10) + 'px';
    });

    circle.on('mouseout', function() {
      tooltip.style.display = 'none';
    });

    markers.push(circle);
  });
}

// Toggle functions
function toggleHeat() {
  if (heatVisible) { map.removeLayer(heatLayer); document.getElementById('btnHeat').classList.remove('active'); }
  else { heatLayer.addTo(map); document.getElementById('btnHeat').classList.add('active'); }
  heatVisible = !heatVisible;
}
function toggleDots() {
  if (dotsVisible) {
    markers.forEach(m => map.removeLayer(m));
    document.getElementById('btnDots').classList.remove('active');
  } else {
    markers.forEach(m => m.addTo(map));
    document.getElementById('btnDots').classList.add('active');
  }
  dotsVisible = !dotsVisible;
}

legendSelectAllBtn.addEventListener('click', () => {
  selectedBandIndexes.clear();
  MIX_BANDS.forEach((_, idx) => selectedBandIndexes.add(idx));
  legendFiltersEl.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
    checkbox.checked = true;
  });
  applyCurrentFilters();
});
legendClearAllBtn.addEventListener('click', () => {
  selectedBandIndexes.clear();
  legendFiltersEl.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
    checkbox.checked = false;
  });
  applyCurrentFilters();
});
storeRangeStartInput.addEventListener('input', applyCurrentFilters);
storeRangeEndInput.addEventListener('input', applyCurrentFilters);
filterStoreTypeEl.addEventListener('change', applyCurrentFilters);
filterHardwareEl.addEventListener('change', applyCurrentFilters);

// Store list panel toggle
const toggleStoreListBtn = document.getElementById('toggleStoreList');
const closeStoreListBtn = document.getElementById('closeStoreList');
const storeListPanel = document.getElementById('storeListPanel');
const lockStoreListBtn = document.getElementById('lockStoreList');
const btnLockFilter = document.getElementById('btnLockFilter');

function updateStoreListLockButton() {
  if (storeListLocked) {
    lockStoreListBtn.textContent = '🔒 已鎖定';
    lockStoreListBtn.classList.add('active');
    btnLockFilter.textContent = '🔒 已鎖定門店';
    btnLockFilter.classList.add('active');
  } else {
    lockStoreListBtn.textContent = '🔓 未鎖定';
    lockStoreListBtn.classList.remove('active');
    btnLockFilter.textContent = '🔓 鎖定當前門店';
    btnLockFilter.classList.remove('active');
  }
}

toggleStoreListBtn.addEventListener('click', () => {
  storeListPanel.classList.toggle('visible');
  toggleStoreListBtn.classList.toggle('hidden', storeListPanel.classList.contains('visible'));
});

closeStoreListBtn.addEventListener('click', () => {
  storeListPanel.classList.remove('visible');
  toggleStoreListBtn.classList.remove('hidden');
});

const lockedSectionEl = document.getElementById('lockedSection');
const lockedCountEl = document.getElementById('lockedCount');
const lockedStoreListEl = document.getElementById('lockedStoreList');
const unlockAllBtn = document.getElementById('unlockAllBtn');

function updateLockedSection() {
  if (storeListLocked && lockedStoreIds.size > 0) {
    lockedSectionEl.classList.add('visible');
    lockedCountEl.textContent = `${lockedStoreIds.size} 家`;
    const sortedIds = [...lockedStoreIds].sort((a, b) => {
      const aNum = parseStoreNumericId(a);
      const bNum = parseStoreNumericId(b);
      if (Number.isFinite(aNum) && Number.isFinite(bNum)) return aNum - bNum;
      return String(a).localeCompare(String(b));
    });
    lockedStoreListEl.innerHTML = sortedIds.map(id =>
      `<span class="locked-store-tag" data-store-id="${id}">${id}</span>`
    ).join('');
    lockedStoreListEl.querySelectorAll('.locked-store-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const store = allStores.find(s => s.store_id === tag.dataset.storeId);
        if (store && Number.isFinite(store.lat) && Number.isFinite(store.lng)) {
          map.flyTo([store.lat, store.lng], 13);
        }
      });
    });
  } else {
    lockedSectionEl.classList.remove('visible');
    lockedStoreListEl.innerHTML = '';
  }
}

function toggleLockStores() {
  if (storeListLocked) {
    storeListLocked = false;
    lockedStoreIds.clear();
  } else {
    const currentFilteredStores = filterStores(allStores);
    lockedStoreIds = new Set(currentFilteredStores.map((store) => store.store_id));
    storeListLocked = true;
  }
  updateStoreListLockButton();
  updateLockedSection();
  applyCurrentFilters();
}

lockStoreListBtn.addEventListener('click', toggleLockStores);
btnLockFilter.addEventListener('click', toggleLockStores);

unlockAllBtn.addEventListener('click', () => {
  storeListLocked = false;
  lockedStoreIds.clear();
  updateStoreListLockButton();
  updateLockedSection();
  applyCurrentFilters();
});

renderLegendFilters();
updateStoreListLockButton();
updateLockedSection();

// ──── Init: applyDBDateRange / applyStores / handleLiveFetch ────
function applyDBDateRange() {
  const fromDate = document.getElementById('dbDateFrom').value;
  const toDate = document.getElementById('dbDateTo').value;
  if (!fromDate || !toDate || !dbReady) return;
  const stores = queryJSONStores(fromDate, toDate);
  applyStores(stores, `${fromDate} ～ ${toDate}（JSON）`);
}

function applyStores(stores, label) {
  allStores = stores;
  if (dateLabel) dateLabel.textContent = label;
  const types = [...new Set(stores.map(s => s.store_type))].filter(Boolean).sort();
  filterStoreTypeEl.innerHTML = '<option value>全部</option>';
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    filterStoreTypeEl.appendChild(opt);
  });
  applyCurrentFilters();
}

async function handleLiveFetch() {
  const fromDate = document.getElementById('dbDateFrom').value;
  const toDate = document.getElementById('dbDateTo').value;
  if (!fromDate || !toDate) { alert('請選擇日期範圍'); return; }
  let pw = savedPassword || promptPassword();
  if (!pw) return;
  const btn = document.getElementById('liveFetchBtn');
  btn.textContent = '⏳ 查詢中...';
  btn.disabled = true;
  try {
    const stores = await liveFetchStores(fromDate, toDate, pw);
    applyStores(stores, `${fromDate} ～ ${toDate}（⚡Live）`);
    btn.textContent = '⚡ Live';
  } catch (e) {
    console.error('Live fetch failed:', e);
    alert('⚡ Live 查詢失敗:\n' + e.message + '\n\n請確認:\n1. api_server.py 正在本機運行\n2. 密碼正確');
    savedPassword = '';
    sessionStorage.removeItem('dbPassword');
    btn.textContent = '⚡ Live';
  }
  btn.disabled = false;
}

// Load JSON data on startup
(async () => {
  try {
    document.getElementById('dbLoadBtn').textContent = '⏳ 載入中...';
    await loadJSONData();
    document.getElementById('dbLoadBtn').textContent = '🔄 載入';
    applyDBDateRange();
  } catch (e) {
    console.error('Failed to load JSON data:', e);
    document.getElementById('dbLoadBtn').textContent = '❌ 載入失敗';
  }
})();

document.getElementById('dbLoadBtn').addEventListener('click', applyDBDateRange);
document.getElementById('dbDateFrom').addEventListener('change', applyDBDateRange);
document.getElementById('dbDateTo').addEventListener('change', applyDBDateRange);
document.getElementById('liveFetchBtn').addEventListener('click', handleLiveFetch);

// Mobile controls toggle
(function() {
  const toggleBtn = document.getElementById('mobileControlsToggle');
  const controls = document.getElementById('controls');
  if (!toggleBtn || !controls) return;
  toggleBtn.addEventListener('click', () => {
    controls.classList.toggle('mobile-visible');
  });
  // Close controls when tapping the map on mobile
  document.getElementById('map').addEventListener('click', () => {
    controls.classList.remove('mobile-visible');
  });
})();
</script>
